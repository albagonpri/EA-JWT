<h2>Inicio</h2>

<p>Has iniciado sesión correctamente</p>
<p *ngIf="currentUser"><strong>Rol:</strong> {{ currentUser.role }}</p>

<div *ngIf="isAdmin()">
  <a routerLink="/admin">Ir al panel de administración</a>
</div>

<h3>Tu Token JWT</h3>
<code>{{ tokenPreview }}</code>

<h3>Prueba de Token: Lista de Usuarios</h3>

<button *ngIf="isAdmin()" (click)="cargarUsuarios()" [disabled]="loadingUsuarios">
  {{ loadingUsuarios ? 'Cargando...' : 'Cargar Lista de Usuarios' }}
</button>

<button (click)="refreshToken()">Refrescar Token</button>

<p>{{ errorUsuarios }}</p>

<ul>
  <li *ngFor="let u of usuarios">
    {{ u.name }} - {{ u.email }} - {{ u.role }}
  </li>
</ul>

<button (click)="logout()">Cerrar Sesión</button>
